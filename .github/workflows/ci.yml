name: CI

# Build + test on every push to main and every PR. Mirrors the local
# `dotnet build && dotnet test` gate Mike runs before each commit so a
# regression that slips locally still fails before the merge button.
#
# Why a sibling Marduk checkout: Enki references Marduk's AMR.Core.*
# projects via relative paths (..\..\..\Marduk\Marduk\AMR.Core\...).
# To keep those paths resolvable in CI without changing the csproj refs,
# we lay both repos out under the same workspace root the same way they
# sit on Mike's dev rig:
#   <workspace>/Enki/...
#   <workspace>/Marduk/Marduk/...
#
# Marduk is a private repo, so cross-repo checkout needs a PAT with read
# access. Add a repository secret named MARDUK_PAT (Settings → Secrets
# and variables → Actions → New repository secret). A fine-grained PAT
# scoped to Marduk-only with "Contents: Read" is enough.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Enki
        uses: actions/checkout@v4
        with:
          path: Enki

      - name: Checkout Marduk (sibling for AMR.Core.* project refs)
        uses: actions/checkout@v4
        with:
          repository: KingOfTheGeeks/Marduk
          path: Marduk/Marduk
          token: ${{ secrets.MARDUK_PAT }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: Enki
        run: dotnet restore SDI.Enki.slnx

      - name: Build (Release)
        working-directory: Enki
        run: dotnet build SDI.Enki.slnx --configuration Release --no-restore

      # Coverage collection. `coverlet.collector` is already referenced
      # in every test project; --collect:"XPlat Code Coverage" produces
      # a coverage.cobertura.xml under
      # `tests/<project>/TestResults/<guid>/`. Tests run as before
      # (incl. `--filter Category!=Sql` to skip Testcontainers smokes
      # on this Docker-less runner).
      - name: Test (with coverage)
        working-directory: Enki
        run: |
          dotnet test SDI.Enki.slnx \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "console;verbosity=normal" \
            --filter "Category!=Sql" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      # Combine the per-project cobertura reports into a single HTML
      # bundle. `dotnet tool install` is local-tool style so the
      # invocation is repo-pinned; the manifest is
      # `Enki/.config/dotnet-tools.json` (added in this commit).
      - name: Generate combined coverage report
        if: always()
        working-directory: Enki
        run: |
          dotnet tool restore
          dotnet tool run reportgenerator \
            "-reports:./TestResults/**/coverage.cobertura.xml" \
            "-targetdir:./TestResults/coverage-report" \
            "-reporttypes:HtmlInline_AzurePipelines;Cobertura;TextSummary"

      # Surface the coverage report as a workflow artifact so it can
      # be downloaded from the run page. Two artifacts: the HTML bundle
      # for human review and the raw cobertura XML for tooling.
      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: Enki/TestResults/coverage-report
          retention-days: 14

      - name: Upload coverage report (cobertura)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: Enki/TestResults/coverage-report/Cobertura.xml
          retention-days: 14

      - name: Print coverage summary
        if: always()
        working-directory: Enki
        run: cat TestResults/coverage-report/Summary.txt || true
